<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
body{
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
    font-family: Arial, sans-serif;
    color: white;
    margin: 0;
    min-height: 100vh;
}

.kozepre{
    display: block;
    margin: 20px auto;
    height: 45px;
    font-size: 20px;
}

#general{
    background-color: #27ae60;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 25px;
    cursor: pointer;

    font-weight: bold;
}

#general:hover{
    background-color: #2ecc71;
    transform: scale(1.05);
}

#elso_player,
#masodik_player{
    width: 120px !important;
    height: 120px !important;
    background-color: rgba(255,255,255,0.15) !important;
    border-radius: 15px;
    border: 3px solid white;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

#elso_player img,
#masodik_player img{
    width: 90px;
    height: 90px;
}

#nyert{
    font-size: 28px;
    font-weight: bold;
    color: #ffe082;
}

table{
    border-collapse: collapse;
    width: 350px;
    background-color: rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    color: white;
    overflow: hidden;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

th{
    background-color: rgba(0,0,0,0.3);
    padding: 12px;
    font-size: 18px;
}

td{
    padding: 10px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.2);
}

tr:hover{
    background-color: rgba(255,255,255,0.1);
}

div{
    font-size: 20px;
    font-weight: bold;
}
</style>
<body style="background-color: gray;">

    <div style="display: flex; gap: 20px; justify-content: center;"> 
        <div style="text-align: center;">
        <div id="elso_player" style="width: 90px; height: 90px; background-color: gray; margin: 0 auto;">

        </div>
        <div>Első játékos</div>
</div>

<div style="text-align: center;">
  <div id="masodik_player" style="width: 90px; height: 90px; background-color: gray; margin: 0 auto;"></div>
  <div>Második játékos</div>
</div>


      </div>

    <script>

const eredmenyek=[];


function general(){
    let random1=Math.floor(Math.random() * 6)+1;
  
    document.getElementById("elso_player").innerHTML= `<img src="${random1}.png">`;
    let random2=Math.floor(Math.random() * 6)+1;
    document.getElementById("masodik_player").innerHTML= `<img src="${random2}.png">`;
    if (random1>random2){
        document.getElementById("nyert").innerHTML="1. játékos nyert";
        eredmenyek.push({
            nyert: "1. Játékos",
            ponttal: random1-random2
        });
    }
    else if( random1===random2){
document.getElementById("nyert").innerHTML="Döntetlen";
eredmenyek.push({
            nyert: "Döntetlen",
            ponttal: 0
        });
    }
    else{
        document.getElementById("nyert").innerHTML="2. játékos nyert";
eredmenyek.push({
            nyert: "2. Játékos",
            ponttal: random2-random1
        });
    }

    tablaBody.innerHTML = "";

for (let i = eredmenyek.length - 1; i >= 0; i--) {
    tablaBody.innerHTML += "<tr>" +
        "<td>" + eredmenyek[i].nyert + "</td>" +
        "<td>" + eredmenyek[i].ponttal + "</td>" +
    "</tr>";

}

}

    </script>
   

   <button id="general" class="kozepre" onclick="general()">Generál</button>
   <p id="nyert" class="kozepre" style="text-align: center;">Nyerters</p>



   <table border="1" style="margin: auto;">
  <thead>
    <tr>
      <th>Nyert</th>
      <th>Ponttal</th>
    </tr>
  </thead>
  <tbody id="tablaBody"></tbody>
</table>

</body>
</html>
